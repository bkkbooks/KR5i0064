body:
  text: 言旣知之後宜遺智慧晦迹韜光證虛應言守空虛無爲久而神效如響應聲也應無從言自然而然心乃通心空無爲久卽明道明道則神通通於一萬事畢一爲根一爲大道根元事爲門得一之元卽太上心印所謂事也事歸一一常存言守一之事功成歸一炁卽身與虛無自然無形一炁常存矣存莫有假言守言一炁常存自身莫令有氣守者假言守耳守虛無自長久言但守虛無自然形神與道長久也大道守一寶章終守一詩范陽盧陲眞姑傳崔少玄本得一之元道德言知白守黑學道君子旣知其白須守其黑陰炁黑也初守黑之時身中黑如漆相似守之不己黑氣日消陰符消盡純陽白氣内明當明之時閉目收視自見五臟宫室自見三萬六千血脈神靈漸至出有入無分身千億是名得一之元守一之人但能虛其身空其心常守空虛内凝神思元始妙氣自然歸流于守一人身中主持性命老君告文始先生曰吾思此道本出杳冥杳冥者守黑也卽守一也葢靜定日久天光内燭脫身殻中收視内觀形貎如然此時外卽光熖周身内則分身千萬此崔女守一詩之妙也太上說心印曰眞人巾金巾此五字乃玉晨君之心印也老君以此傳與文始先生守此心印卽是守一之元也卽是入天道之門上聖高眞未有不從此而入者要而言之守一之元卽是守空無寂寂中元神也一之元不可見者象罔是也一之元可得者元珠是也匪受自天太老之眞老或作無旡上之仙光含影藏此言得一之元湏精誠守神積功鍊形冥心無心冥身無身内不分己身外不分天地久則骨肉亦化爲純陽精氣陰氣内消始覺天光内照煥然照蛻身之中天光旣合於内形影滅藏于外也形於自然此言光含影藏神凝空寂中忽然呈形此乃天仙之姿出於自然非尋常之身也眞安匪求衡獄眞子注云此言道成形凝身中非智巧所能求但須冥心無心㝠身無身若苟有身心卽神不凝矣神之久留棲眞子王損之注云眞胎所安只藉凝思于内元神久留耳昔老君告文始先生曰人能留神于身内知而抱玄𡻕月堅久其神久留久留方凝成神仙衡獄眞子注云守一功至則神凝眞形安在我子宫之中子宫卽氣海血海也眞安在子宫名曰神之久留必須積公堅苦𡻕月深遠方得成形西昇經云藏人于人而不出藏身于身而不現然後天道盛矣旨哉言乎又曰無心之心無身之身是謂道人美淑則眞此言守一之久則陽和之氣照燭一身猶如燈燭朗朗然了明無物陰氣盡消眞形更眞體性剛柔此言無形妙法眞如法身能剛能柔柔謂攬之不盈手剛謂貫串金石丹霄碧墟上聖之儔右守一詩終
