front:
  text: 孫不二元君傳述丹道祕書三卷孫不二元君傳述丹道秘書三卷玉淸胎元内養眞經寶神元臺眞君下傳爾時太上老君因朝元始上帝吿太上曰精虛則炎上氣虛則下走陰陽各行於水火金木不成於夫婦是故下土之人眞氣日衰陰邪日戾殘其本夀精神不全淪爲下鬼我嘗受汝胎元妙道以外玄牝合内玄牝以外眞神補内眞氣聚集天之萬寶養我胎之元精使神生於胎氣戀於神心君濳御氣息調匀萬神敬禮羣魔朿形汝當教其兆民先學定心心定氣住氣住神全神全形固綿綿若存而不息用之不窮而見功谷神不死合我眞宗我愍世人外爲酒色之所賊内爲思慮之所縈惟貪名利消落精神戀著粉屍巧笑娥眉逐外忘本崩我靈基使坎離壞散致魂魄流離兒女成列形骸漸衰爲一棺之聚土失天地之眞機良可悲乎汝勸世人先持小戒以至大戒先學息心漸入無爲因定生明因明悟道上品之人以麄易細成光明身居淸淨天夀命旡量中等之人延年住身補復胎元不致夭傷下品之人遠離情慾淡薄利名歸向眞風順行聖教汝當以我妙語分千萬形周流教化漸漸接引捨邪歸正去濁留淸證旡上道是時太上老君恭奉聖訓卽與紫光天母各化其形爲塵沙眾分身世界普度有情未久之間上界萬二千天於蓮華中化生旡量天人各各乘空詣玉淸境面對眞尊而說頌曰旡上神父開大方便戒敕太上紫光天母化形下方廣度我輩並因戒定咸得上生獲意生身證旡上道我等變化百千萬身身具萬古讚揚玄德百千萬刼亦未能盡巍巍功德不可窮詰我等信受將何補報誓發大願於未來刼復度有情惟此一心是名報德旡量天人說是妙頌各以天華寶香散虛空中而爲供奉遥望眞尊百禮而退玉淸胎元内養眞經終玉淸旡上内景眞經大羅眞天元天大聖后紫光天母下傅爾時元始至眞大聖化生開天以大神通力大智慧力結配世界配合陰陽主張造化先於大梵眞天玄空之中化諸外象以表内景而分九氣爲東方木精之色結成九氣丈人而君主之在人爲肝爲魂次分七氣爲西方金精之色結化七氣丈人而君主之在人爲肺爲魄㳄分三氣爲南方火精之色結化三氣丈人而君主之在人爲心爲神次分五氣爲北方坎精之色結化五氣丈人而君主之在人爲腎爲精四方餘氣水火金木分布中央爲黃庭之色結化一氣丈人而君主之在人爲脾爲思五臟含識共具十眞十眞之英能成九轉聚爲丹藥散爲甘露周旋上下煉養百骸沐濁留淸消陰鑄陽復我太初保我大全出於崑崙入於太淵引其龍變經於虎城四氣和合成我至眞衰殘易盛耄耋還嬰朽容再鮮白髮重靑韻如鐘發身如羽輕盡更凡骨飛昇上淸世之學士立戒持定而生智明以其三力永保億年履輕淸之氣運定變化以超仙也左右二玄旡極眞宰以我此道廣布天人使其捨離無常之業而入眞一之妙不老不死湛寂常存元始尊眞於其七竅放大光明照無量土萬二千天百億人界各以自力散香雨華而爲供奉莫不欣悅咸悟本心爾時玉淸化宫於空玄中忽見寶月光明照暎内外十虛寶月之中包含紫氣之内有一嬰兒坐寶華臺口放金光發大玉音而說偈曰一心生正定萬象自然陳逐方分五氣五氣孕一靈一靈通變化結煉本來眞本眞非有相非有亦非無兆能通此理方悟攝塵珠玄空之中月光之内玉嬰演教天上天下一時皆聞莫不慧海湛然業山摧毁反觀内照永契道眞仰望聖光作禮而去敬信奉持玉淸旡上内景眞經終大道守一寶章衡嶽眞子傳又名爲玄珠心鏡道無爲無不爲可心證非智知何謂知何謂證智遣智
