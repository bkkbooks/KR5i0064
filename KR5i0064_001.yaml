front:
  text: 孫不二元君傳述丹道祕書三卷孫不二元君傳述丹道祕書三卷玉淸胎元內養真經寶神元臺真君下傳爾時太上老君因朝元始上帝告太上曰精虛則炎上氣虛則下走陰陽各行於水火金木不成於夫婦是故下土之人真氣日衰陰邪日戾殘其本夀精神不全淪為下鬼我嘗受汝胎元妙道以外玄牝合內玄牝以外真神補內真氣聚集天之萬寶養我胎之元精使神生於胎氣戀於神心君濳御氣息調勻萬神敬禮羣魔朿形汝當教其兆民先學定心心定氣住氣住神全神全形固綿綿若存而不息用之不窮而見功谷神不死合我真宗我愍世人外為酒色之所賊內為思慮之所縈惟貪名利消落精神戀著粉尸巧笑娥眉逐外忘本崩我靈基使坎離壞散致魂魄流離兒女成列形骸漸衰為一棺之聚土失天地之真機良可悲乎汝勸世人先持小戒以至大戒先學息心漸入無為因定生明因明悟道上品之人以粗易細成光明身居淸淨天夀命旡量中等之人延年住身補復胎元不致夭傷下品之人遠離情欲淡薄利名歸向真風順行聖教汝當以我妙語分千萬形周流教化漸漸接引捨邪歸正去濁留淸證旡上道是時太上老君恭奉聖訓即與紫光天母各化其形為塵沙衆分身世界普度有情未久之間上界萬二千天於蓮華中化生旡量天人各各乘空詣玉淸境面對真尊而説頌曰旡上神父開大方便戒敕太上紫光天母化形下方廣度我輩並因戒定咸得上生獲意生身證旡上道我等變化百千萬身身具萬古讚揚玄德百千萬劫亦未能盡巍巍功德不可窮詰我等信受將何補報誓發大願於未來劫復度有情惟此一心是名報德旡量天人説是妙頌各以天華寶香散虛空中而為供奉遙望真尊百禮而退玉淸胎元內養真經終玉淸旡上內景真經大羅真天元天大聖后紫光天母下傅爾時元始至真大聖化生開天以大神通力大智慧力結配世界配合陰陽主張造化先於大梵真天玄空之中化諸外象以表內景而分九氣為東方木精之色結成九氣丈人而君主之在人為肝為魂次分七氣為西方金精之色結化七氣丈人而君主之在人為肺為魄涎分三氣為南方火精之色結化三氣丈人而君主之在人為心為神次分五氣為北方坎精之色結化五氣丈人而君主之在人為腎為精四方餘氣水火金木分布中央為黃庭之色結化一氣丈人而君主之在人為脾為思五臟含識共具十真十真之英能成九轉聚為丹藥散為甘露周旋上下煉養百骸沐濁留淸消陰鑄陽復我太初保我大全出於崑崙入於太淵引其龍變經於虎城四氣和合成我至真衰殘易盛耄耋還嬰朽容再鮮白髮重靑韻如鐘發身如羽輕盡更凡骨飛升上淸世之學士立戒持定而生智明以其三力永保億年履輕淸之氣運定變化以超仙也左右二玄旡極真宰以我此道廣布天人使其捨離無常之業而入真一之妙不老不死湛寂常存元始尊真於其七竅放大光明照無量土萬二千天百億人界各以自力散香雨華而為供奉莫不欣悅咸悟本心爾時玉淸化宫於空玄中忽見寶月光明照映內外十虛寶月之中包含紫氣之內有一嬰兒坐寶華臺口放金光發大玉音而説偈曰一心生正定萬象自然陳逐方分五氣五氣孕一靈一靈通變化結煉本來真本真非有相非有亦非無兆能通此理方悟攝塵珠玄空之中月光之內玉嬰演教天上天下一時皆聞莫不慧海湛然業山摧毁反觀內照永契道真仰望聖光作禮而去敬信奉持玉淸旡上內景真經終大道守一寶章衡嶽真子傳又名為玄珠心鏡道無為無不為可心證非智知何謂知何謂證智遣智
